version: '3.8'

services:
  # ──────────────── KAFKA ────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ──────────────── DATABASES ────────────────
  job-db:
    image: postgres:16-alpine
    container_name: job-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${JOB_DB_NAME}
    ports:
      - "${JOB_DB_PORT}:5432"
    volumes:
      - job_db_data:/var/lib/postgresql/data

  candidate-db:
    image: postgres:16-alpine
    container_name: candidate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${CANDIDATE_DB_NAME}
    ports:
      - "${CANDIDATE_DB_PORT}:5432"
    volumes:
      - candidate_db_data:/var/lib/postgresql/data

  rag-db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${RAG_DB_NAME}
    ports:
      - "${RAG_DB_PORT}:5432"
    volumes:
      - rag_db_data:/var/lib/postgresql/data

  # ──────────────── KAFKA UI (optional but helpful) ────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  job_db_data:
  candidate_db_data:
  rag_db_data: