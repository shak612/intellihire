version: '3.8'

services:
  # ──────────────── KAFKA ────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ──────────────── DATABASES ────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  job-db:
    image: postgres:16-alpine
    container_name: job-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${JOB_DB_NAME}
    ports:
      - "${JOB_DB_PORT}:5432"
    volumes:
      - job_db_data:/var/lib/postgresql/data

  candidate-db:
    image: postgres:16-alpine
    container_name: candidate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${CANDIDATE_DB_NAME}
    ports:
      - "${CANDIDATE_DB_PORT}:5432"
    volumes:
      - candidate_db_data:/var/lib/postgresql/data

  rag-db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${RAG_DB_NAME}
    ports:
      - "${RAG_DB_PORT}:5432"
    volumes:
      - rag_db_data:/var/lib/postgresql/data

  # ──────────────── MICROSERVICES ────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - KAFKA_BROKER=kafka:9092
      - AUTH_DB_HOST=auth-db
      - AUTH_DB_PORT=5432
    depends_on:
      - auth-db
      - kafka
    restart: unless-stopped

  job-service:
    build:
      context: .
      dockerfile: apps/job-service/Dockerfile
    container_name: job-service
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
      - KAFKA_BROKER=kafka:9092
      - JOB_DB_HOST=job-db
      - JOB_DB_PORT=5432      
    depends_on:
      - job-db
      - kafka
    restart: unless-stopped

  candidate-service:
    build:
      context: .
      dockerfile: apps/candidate-service/Dockerfile
    container_name: candidate-service
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - NODE_ENV=production
      - KAFKA_BROKER=kafka:9092
      - CANDIDATE_DB_HOST=candidate-db
      - CANDIDATE_DB_PORT=5432
    depends_on:
      - candidate-db
      - kafka
    restart: unless-stopped

  rag-service:
    build:
      context: .
      dockerfile: apps/rag-service/Dockerfile
    container_name: rag-service
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      - NODE_ENV=production
      - KAFKA_BROKER=kafka:9092
      - RAG_DB_HOST=rag-db
      - RAG_DB_PORT=5432
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - rag-db
      - kafka
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "3004:3004"
    env_file: .env
    environment:
      - NODE_ENV=production
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  # ──────────────── FRONTEND ────────────────
  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  auth_db_data:
  job_db_data:
  candidate_db_data:
  rag_db_data: